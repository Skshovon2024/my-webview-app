name: Flutter Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - name: Build App
        run: |
          cd edp_online_shop
          flutter pub get
          flutter build appbundle
      - uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: edp_online_shop/build/app/outputs/bundle/release/app-release.aab
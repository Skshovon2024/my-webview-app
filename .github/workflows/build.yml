name: Flutter Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      - name: Build App
        run: |
          cd edp_online_shop
          flutter pub get
          flutter build appbundle
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: edp_online_shop/build/app/outputs/bundle/release/app-release.aab